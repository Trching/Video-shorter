<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Shorter - AI Video Shortening Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="file"] {
            display: block;
            width: 100%;
            padding: 12px;
            border: 2px dashed #667eea;
            border-radius: 5px;
            cursor: pointer;
            background: #f9f9f9;
            transition: all 0.3s ease;
        }

        input[type="file"]:hover {
            background: #f0f0f0;
            border-color: #764ba2;
        }

        .file-info {
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            display: none;
            font-size: 14px;
            color: #666;
        }

        .file-info.visible {
            display: block;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
            font-size: 14px;
        }

        .status.visible {
            display: block;
        }

        .status.processing {
            background: #e3f2fd;
            color: #1976d2;
            border: 1px solid #1976d2;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
            border: 1px solid #388e3c;
        }

        .status.error {
            background: #ffebee;
            color: #d32f2f;
            border: 1px solid #d32f2f;
        }

        .download-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #388e3c;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .download-link:hover {
            background: #2e7d32;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(25, 118, 210, 0.3);
            border-radius: 50%;
            border-top-color: #1976d2;
            animation: spin 0.6s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            animation: progress 3s ease-in-out infinite;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Video Shorter</h1>
        <p class="subtitle">AI-powered video shortening tool</p>
        
        <div class="input-group">
            <label for="videoFile">Select Video File</label>
            <input type="file" id="videoFile" accept="video/*">
            <div class="file-info" id="fileInfo"></div>
        </div>

        <button id="processBtn" disabled>Shorten Video</button>

        <div class="status" id="status"></div>
        <div class="progress-bar" id="progressBar" style="display: none;">
            <div class="progress-fill"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        const videoFileInput = document.getElementById('videoFile');
        const processBtn = document.getElementById('processBtn');
        const statusDiv = document.getElementById('status');
        const fileInfo = document.getElementById('fileInfo');
        const progressBar = document.getElementById('progressBar');

        // Enable button only when file is selected
        videoFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                processBtn.disabled = false;
                const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
                fileInfo.textContent = `Selected: ${file.name} (${sizeMB} MB)`;
                fileInfo.classList.add('visible');
            } else {
                processBtn.disabled = true;
                fileInfo.classList.remove('visible');
            }
        });

        // Process video
        processBtn.addEventListener('click', async () => {
            const file = videoFileInput.files[0];
            if (!file) return;

            // Disable button and show processing status
            processBtn.disabled = true;
            statusDiv.className = 'status visible processing';
            statusDiv.innerHTML = '<span class="spinner"></span>Processing your video...';
            progressBar.style.display = 'block';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${API_URL}/process`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || `HTTP error! status: ${response.status}`);
                }

                // Get the video blob
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);

                // Show success message with download link
                statusDiv.className = 'status visible success';
                statusDiv.innerHTML = `✓ Video processed successfully!<br><a href="${url}" download="shortened_video.mp4" class="download-link">Download Shortened Video</a>`;
                progressBar.style.display = 'none';

            } catch (error) {
                statusDiv.className = 'status visible error';
                statusDiv.innerHTML = `✗ Error: ${error.message}`;
                progressBar.style.display = 'none';
                console.error('Error:', error);
            } finally {
                processBtn.disabled = false;
                videoFileInput.value = '';
                fileInfo.classList.remove('visible');
            }
        });

        // Check API connectivity
        fetch(`${API_URL}/health`)
            .catch(() => {
                console.warn('Backend not connected. Make sure backend is running on port 8000');
            });
    </script>
</body>
</html>
